---
- name: Ping pycontrol
  hosts: all
  environment:
    DEBIAN_FRONTEND: noninteractive
    APT_OPTS: -o Acquire::ForceIPv4=true
  tasks:
    - name: Ping my hosts
      ansible.builtin.ping: null

    - name: Verify SSH connection works without prompting
      ansible.builtin.command: echo "Hello from the Pi! SSH is working perfectly."
      register: ssh_verification

    - name: Print the verification message
      ansible.builtin.debug:
        msg: "{{ ssh_verification.stdout }}"

    - name: Set timezone to UTC
      become: yes
      timezone:
        name: UTC

    - name: Disable root from loggin in via ssh
      become: true
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: ^PermitRootLogin
        line: PermitRootLogin no
        state: present
      notify:
        - restart ssh
      tags:
        - security

    - name: Configure u-blox 7 GPS receiver device with gpsd
      become: true
      lineinfile:
        path: /etc/default/gpsd
        regexp: ^DEVICES=
        line: DEVICES=/dev/ttyACM0
        state: present
      notify:
        - restart gpsd
      tags:
        - install

    - name: Configure Udev rule for GPS hotplugging
      become: true
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/99-gpsd-hotplug.rules
        content: |
          ACTION=="add", KERNEL=="ttyACM0", SUBSYSTEM=="tty", TAG+="systemd", ENV{SYSTEMD_WANTS}="gpsd.service"
        mode: '0644'

    - name: Configure gpsd no wait
      become: true
      lineinfile:
        path: /etc/default/gpsd
        regexp: ^GPSD_OPTIONS=
        line: GPSD_OPTIONS="-n"
        state: present
      notify:
        - restart gpsd
      tags:
        - install

    - name: Chrony - disable network time sync (NTP)
      become: true
      lineinfile:
        path: /etc/chrony/chrony.conf
        regexp: ^pool .+ iburst
        line: "# ansible commented out: pool 2.debian.pool.ntp.org iburst"
        state: present
      notify:
        - restart chronyd
      tags:
        - install

    - name: Chrony - synchronizes the system clock to gps time via gpsd
      become: true
      lineinfile:
        path: /etc/chrony/chrony.conf
        regexp: ^refclock
        line: refclock SHM 0 offset 0.5 delay 0.1 refid GPS
        state: present
      notify:
        - restart chronyd
      tags:
        - install

    - name: IpV4 - Setup IpV4 Multicast Route
      become: true
      ansible.builtin.copy:
        dest: /etc/systemd/network/10-loopback.network
        content: |
          # By default, the operating system doesn't know which network
          # interface to use for sending multicast packets. When no other
          # network is up, it has nowhere to send them, which causes a
          # "Network is unreachable" error.
          #
          # To fix this, we need to add a route that explicitly tells the
          # kernel: "Any traffic destined for the private multicast range
          # (239.0.0.0 to 239.255.255.255) should be sent through the loopback
          # device."
          #
          [Match]
          Name=lo

          [Network]
          # Empty, we're only adding route with this file.

          # All multicast Ipv4 traffic is sent to the loopback device.
          [Route]
          Destination=239.0.0.0/8
        mode: '0644'
        owner: root
        group: root
      notify:
        - restart networking
      tags:
        - ipv4

    - name: Wifi - Ensure systemd-networkd is enabled and running
      become: true
      ansible.builtin.systemd:
        name: systemd-networkd
        enabled: true
        state: started

    - name: Wifi - Setup static IP
      become: true
      ansible.builtin.copy:
        dest: /etc/systemd/network/10-wlan0-ap.network
        content: |
          [Match]
          Name=wlan0

          [Network]
          Address={{wlan0_ip}}/24
        mode: '0644'
        owner: root
        group: root
      notify:
        - restart networking
      tags:
        - wifi

    - name: Wifi - Setup ad-hoc wireless network
      become: true
      ansible.builtin.copy:
        dest: /etc/hostapd/hostapd.conf
        content: |
          interface=wlan0
          driver=nl80211
          ssid={{ssid}}
          hw_mode=g
          channel=7
          wmm_enabled=0
          macaddr_acl=0
          auth_algs=1
          ignore_broadcast_ssid=0
          wpa=2
          wpa_passphrase={{password}}
          wpa_key_mgmt=WPA-PSK
          wpa_pairwise=TKIP
          rsn_pairwise=CCMP
        mode: '0644'
        owner: root
        group: root
      notify:
        - restart networking
      tags:
        - wifi

    - name: Wifi - hostapd config
      become: true
      lineinfile:
        path: /etc/default/hostapd
        regexp: '^#DAEMON_CONF=""'
        line: 'DAEMON_CONF="/etc/hostapd/hostapd.conf"'
        state: present
      notify:
        - restart networking
      tags:
        - wifi

    - name: Wifi - Configure NetworkManager to ignore wlan0 so hostapd can use it
      become: yes
      ansible.builtin.ini_file:
        path: /etc/NetworkManager/NetworkManager.conf
        section: keyfile
        option: unmanaged-devices
        value: interface-name:wlan0
        mode: '0644'
      notify:
        - restart networking
      tags:
        - wifi

    - name: Wifi - Setup dnsmasq
      become: true
      ansible.builtin.copy:
        dest: /etc/dnsmasq.conf
        content: |
          interface=wlan0
          dhcp-range={{dhcp_pool}},255.255.255.0,12h
          # Add domain requests get redirect to the pycontrol app.
          address=/#/{{wlan0_ip}}
          address=/pycontrol/{{wlan0_ip}}
          # Create aliases (CNAMEs) that point to the primary name
          # Format is cname=<alias>,<target>
          cname=app,pycontrol
        mode: '0644'
        owner: root
        group: root
      notify:
        - restart networking
      tags:
        - wifi

    - name: 'PyControl - C++ camera_control_bin service'
      become: true
      ansible.builtin.copy:
        dest: /etc/systemd/system/pycontrol-camera.service
        content: |
          [Unit]
          Description=PyControl Camera Control Service
          # Start this service after the network is up and gpsd is ready
          After=network.target gpsd.socket

          [Service]
          # The type of the service
          Type=simple

          # Must run as root to get cpu affinity permission.
          User=root
          Group=root

          # The working directory for your executable
          WorkingDirectory=/home/{{username}}/pycontrol

          # The full command to execute (use absolute paths)
          ExecStart=/home/{{username}}/pycontrol/src/camera_control/camera_control_bin

          # Automatically restart the service if it fails
          Restart=on-failure
          RestartSec=5

          # Pin this to cpu core 3.
          CPUAffinity=3

          # Use highest priority (that's not Real-Time Fifo setting).
          Nice=-20

          [Install]
          # Enable this service for the default multi-user runlevel
          WantedBy=multi-user.target
        mode: '0644'
        owner: root
        group: root
      tags:
        - pycontrol

    - name: PyControl - Webapp service
      become: true
      ansible.builtin.copy:
        dest: /etc/systemd/system/pycontrol-webapp.service
        content: |
          [Unit]
          Description=PyControl Flask Web Application
          # Start this after the main camera control service is running
          After=pycontrol-camera.service

          [Service]
          Type=simple
          User=root
          Group=root

          # Grant the service permission to bind to ports < 1024 without root,
          # so it can hows a webapp on port 80.
          AmbientCapabilities=CAP_NET_BIND_SERVICE

          # The working directory for your Flask app
          WorkingDirectory=/home/{{username}}/pycontrol

          # The command to start the Flask app
          # IMPORTANT: If you use a Python virtual environment, change the path
          # to /home/nhilton/pycontrol/venv/bin/python3 or similar.
          ExecStart=/home/{{username}}/pycontrol/webapp/venv/bin/python -m webapp.webapp

          Restart=on-failure
          RestartSec=5

          # Keep off cpu 3.
          CPUAffinity=0-2

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
        owner: root
        group: root
      tags:
        - pycontrol

    - name: Create /etc/systemd/system/chrony.service.d
      become: true
      ansible.builtin.file:
        path: /etc/systemd/system/chrony.service.d
        state: directory
        mode: '0755'

    - name: Chrony CPU Affinity
      become: true
      ansible.builtin.copy:
        dest: /etc/systemd/system/chrony.service.d/override.conf
        content: |
          [Service]
          # Keep off cpu 3.
          CPUAffinity=0-2

    - name: Create /etc/systemd/system/gpsd.service.d
      become: true
      ansible.builtin.file:
        path: /etc/systemd/system/gpsd.service.d
        state: directory
        mode: '0755'

    - name: gpsd CPU Affinity
      become: true
      ansible.builtin.copy:
        dest: /etc/systemd/system/gpsd.service.d/override.conf
        content: |
          [Service]
          # Keep off cpu 3.
          CPUAffinity=0-2

          [Unit]
          BindsTo=dev-ttyACM0.device
          After=dev-ttyACM0.device

    - name: Enable PyControl services
      become: true
      ansible.builtin.systemd:
        daemon_reload: true
        name: "{{ item }}"
        # state: started : will not start until reboot or manual trigger
        enabled: true
      loop:
        - pycontrol-camera.service
        - pycontrol-webapp.service
      tags:
        - pycontrol

    - name: Enable and start networking services
      become: true
      ansible.builtin.systemd:
        daemon_reload: true
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - hostapd.service
        - dnsmasq.service
      tags:
        - wifi

  handlers:

    - name: restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted
        enabled: true

    - name: restart gpsd
      ansible.builtin.service:
        name: gpsd
        state: restarted
        enabled: true

    - name: restart chronyd
      ansible.builtin.service:
        name: chronyd
        state: restarted
        enabled: true

    - name: restart networking
      ansible.builtin.service:
        name: "{{ item }}"
        state: restarted
        enabled: true
      loop:
        - NetworkManager
        - systemd-networkd
        - hostapd
